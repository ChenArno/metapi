services:
  metapi:
    container_name: metapi
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: metapi:local
    init: true
    ports:
      - "${METAPI_PORT:-4000}:4000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: 4000
      DATA_DIR: /app/data
      TZ: ${TZ:-Asia/Shanghai}
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN is required}
      PROXY_TOKEN: ${PROXY_TOKEN:?PROXY_TOKEN is required}
      ACCOUNT_CREDENTIAL_SECRET: ${ACCOUNT_CREDENTIAL_SECRET:?ACCOUNT_CREDENTIAL_SECRET is required}
      CHECKIN_CRON: ${CHECKIN_CRON:-0 8 * * *}
      BALANCE_REFRESH_CRON: ${BALANCE_REFRESH_CRON:-0 * * * *}
      MODEL_AVAILABILITY_PROBE_ENABLED: ${MODEL_AVAILABILITY_PROBE_ENABLED:-false}
      MODEL_AVAILABILITY_PROBE_INTERVAL_MS: ${MODEL_AVAILABILITY_PROBE_INTERVAL_MS:-1800000}
      MODEL_AVAILABILITY_PROBE_TIMEOUT_MS: ${MODEL_AVAILABILITY_PROBE_TIMEOUT_MS:-15000}
      MODEL_AVAILABILITY_PROBE_CONCURRENCY: ${MODEL_AVAILABILITY_PROBE_CONCURRENCY:-1}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      BARK_URL: ${BARK_URL:-}
      SERVERCHAN_KEY: ${SERVERCHAN_KEY:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SYSTEM_PROXY_URL: ${SYSTEM_PROXY_URL:-}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      NOTIFY_COOLDOWN_SEC: ${NOTIFY_COOLDOWN_SEC:-300}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
